name: Update packages
on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update all packages"
        required: false
        type: boolean
        default: false

env:
  REPO_RELEASE_NAME: "current"
  REPO_FILENAME: "hypergonial"
  REPO_URL: "https://github.com/hypergonial/arch_repo/releases/download/current"

concurrency:
  group: "update-packages"
  cancel-in-progress: false

jobs:
  check:
    name: Check for package updates
    runs-on: ubuntu-slim
    outputs:
      needs_run: ${{ steps.gen_matrix.outputs.is_empty == 'false' }}
      matrix: ${{ steps.gen_matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Check all packages for updates
        id: gen_matrix
        shell: bash
        env:
          FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_update == 'true' }}
        run: |
          # Outputs: is_empty, matrix
          python3 .github/scripts/check_packages.py

  makepkg:
    name: Make ${{ matrix.name }} ${{ matrix.latest_version }}-${{ matrix.desired_pkgrel }}
    needs: check
    if: needs.check.outputs.needs_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    strategy:
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    steps:
      - name: Update system
        run: |
          pacman-key --init
          pacman -Syu --noconfirm

      - name: Install tools
        run: |
          pacman -Sy --noconfirm --needed pacman-contrib git tar zstd gnupg curl python

      # Replace the pacman executable with a wrapper that forces "yes" to most prompts
      # Fun fact: --ask is undocumented, see more:
      # https://unix.stackexchange.com/questions/274727/how-to-force-pacman-to-answer-yes-to-all-questions/584001#584001
      - name: Make pacman unattended
        shell: python
        run: |
          import shutil
          pacman_exec = shutil.which("pacman")
          shutil.move(pacman_exec, f"{pacman_exec}.orig")
          with open(pacman_exec, "w") as f:
              f.write("#!/usr/bin/env bash\n")
              f.write(f'exec "{pacman_exec}.orig" --ask 6 --noconfirm "$@"\n')
          shutil.chmod(pacman_exec, 0o755)

      - name: Set packager
        run: |
          echo 'PACKAGER="hypergonial <git@hypergonial.com>"' >> /etc/makepkg.conf

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Get job count
        id: jobs
        env:
          PARALLEL_BUILD: ${{ matrix.parallel_build }}
        run: |
          if [ "$PARALLEL_BUILD" = "true" ]; then
            count=$(nproc)
          else
            count=1
          fi
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Using $count parallel jobs for building."

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: repo

      - name: Update PKGBUILD
        shell: bash
        working-directory: repo
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          LATEST_VERSION: ${{ matrix.latest_version }}
          DESIRED_PKGREL: ${{ matrix.desired_pkgrel }}
          CURRENT_VERSION: ${{ matrix.current_version }}
          CURRENT_PKGREL: ${{ matrix.current_pkgrel }}
        run: |
          chown -R builder:builder .
          sudo --preserve-env -u builder python3 .github/scripts/update_pkgbuild.py
          chown -R root:root .

      # TODO: Signing the package would be nice

      # This would be a better way to handle the "yes" prompt but "--ask" is not forwarded by makepkg to pacman:
      # https://unix.stackexchange.com/questions/274727/how-to-force-pacman-to-answer-yes-to-all-questions/584001#584001

      - name: Make package
        id: package
        working-directory: repo/${{ matrix.name }}
        env:
          MAKEFLAGS: "-j${{ steps.jobs.outputs.count }}"
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.jobs.outputs.count }}
        run: |
          chown -R builder:builder .
          sudo --preserve-env -u builder makepkg --syncdeps --needed --cleanbuild
          echo filename="$(ls -1 *.pkg.tar.zst | grep -v -- '-debug-' | head -n1)" >> $GITHUB_OUTPUT
          chown -R root:root .

      - name: Upload package file
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.name }}
          path: repo/${{ matrix.name }}/${{ steps.package.outputs.filename }}
          retention-days: 1

      - name: Upload PKGBUILD
        uses: actions/upload-artifact@v7
        with:
          name: pkgbuild-${{ matrix.name }}
          path: repo/${{ matrix.name }}/PKGBUILD
          retention-days: 1

  update_repo:
    name: Update repository files
    needs: [check, makepkg]
    if: needs.check.outputs.needs_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write
    steps:
      - name: Update system
        run: |
          pacman-key --init
          pacman -Syu --noconfirm

      - name: Install tools
        run: |
          pacman -Sy --noconfirm --needed git tar zstd gnupg curl github-cli python jq

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: repo

      - name: Download package files
        uses: actions/download-artifact@v7
        with:
          pattern: pkg-*
          path: packages

      - name: Download PKGBUILD files
        uses: actions/download-artifact@v7
        with:
          pattern: pkgbuild-*
          path: pkgbuilds

      - name: Download existing repository db
        shell: bash
        continue-on-error: true
        run: |
          curl -sfL -o ${{ env.REPO_FILENAME }}.db.tar.zst "${{ env.REPO_URL }}/${{ env.REPO_FILENAME }}.db.tar.zst"
          curl -sfL -o ${{ env.REPO_FILENAME }}.files.tar.zst "${{ env.REPO_URL }}/${{ env.REPO_FILENAME }}.files.tar.zst"
          ln -s ${{ env.REPO_FILENAME }}.db.tar.zst ${{ env.REPO_FILENAME }}.db
          ln -s ${{ env.REPO_FILENAME }}.files.tar.zst ${{ env.REPO_FILENAME }}.files

      - name: Update repository db
        id: repo
        run: |
          # Find every package file and add it to the repo
          for pkg in $(find packages -name '*.pkg.tar.zst'); do
            repo-add "${{ env.REPO_FILENAME }}.db.tar.zst" "$pkg"
          done

          echo path=${{ env.REPO_FILENAME }}.db >> $GITHUB_OUTPUT
          echo files_path=${{ env.REPO_FILENAME }}.files >> $GITHUB_OUTPUT
          echo path_zst=${{ env.REPO_FILENAME }}.db.tar.zst >> $GITHUB_OUTPUT
          echo files_path_zst=${{ env.REPO_FILENAME }}.files.tar.zst >> $GITHUB_OUTPUT

      - name: Create Release (if not exists)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ env.REPO_RELEASE_NAME }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release create "${{ env.REPO_RELEASE_NAME }}" --repo "${{ github.repository }}" --title "${{ env.REPO_RELEASE_NAME }}" --notes "Arch Package Repository"
          fi

      - name: Update repository files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ env.REPO_RELEASE_NAME }}" "${{ steps.repo.outputs.path }}" --repo "${{ github.repository }}" --clobber
          gh release upload "${{ env.REPO_RELEASE_NAME }}" "${{ steps.repo.outputs.files_path }}" --repo "${{ github.repository }}" --clobber
          gh release upload "${{ env.REPO_RELEASE_NAME }}" "${{ steps.repo.outputs.path_zst }}" --repo "${{ github.repository }}" --clobber
          gh release upload "${{ env.REPO_RELEASE_NAME }}" "${{ steps.repo.outputs.files_path_zst }}" --repo "${{ github.repository }}" --clobber

          for pkg in $(find packages -name '*.pkg.tar.zst'); do
            pkg_name=$(basename "$pkg" | sed -E 's/-([0-9]+:)?[^-]+-[0-9]+-[^-]+\.pkg\.tar\.zst$//')
            existing_assets=$(gh release view "${{ env.REPO_RELEASE_NAME }}" --repo "${{ github.repository }}" --json assets --jq ".assets[] | select(.name | startswith(\"$pkg_name-\")) | .name")

            # Delete assets of the same name but different versions
            for asset in $existing_assets; do
              asset_name=$(basename "$asset" | sed -E 's/-([0-9]+:)?[^-]+-[0-9]+-[^-]+\.pkg\.tar\.zst$//')
              if [ "$asset_name" = "$pkg_name" ]; then
                echo "Deleting existing asset: $asset"
                gh release delete-asset "${{ env.REPO_RELEASE_NAME }}" "$asset" --repo "${{ github.repository }}" --yes
              fi
            done

            # Upload the new package
            gh release upload "${{ env.REPO_RELEASE_NAME }}" "$pkg" --repo "${{ github.repository }}" --clobber

            echo "Updated package: $pkg"
          done

      - name: Update PKGBUILD files
        shell: bash
        run: |
          for file in $(find pkgbuilds -name 'PKGBUILD'); do
            # Parse the pkgname= line from the file
            pkgname=$(grep '^pkgname=' "$file" | head -n1 | cut -d= -f2 | tr -d "'\"")
            if [ -n "$pkgname" ]; then
              echo "Updating PKGBUILD for $pkgname"
              cp "$file" "repo/$pkgname/PKGBUILD"
            else
              echo "Could not find pkgname in $file, skipping"
            fi
          done

      - name: Commit and push PKGBUILD changes
        shell: bash
        working-directory: repo
        run: |
          git config --global --add safe.directory "$PWD"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -am "Bump PKGBUILDs"
          # Move the release tag to the latest commit
          git tag -f ${{ env.REPO_RELEASE_NAME }}
          git push origin ${{ github.event.repository.default_branch }} --tags --force
